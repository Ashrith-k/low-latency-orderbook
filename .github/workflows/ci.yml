name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [debug, release]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
            packages: gcc-13 g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
            packages: clang-17
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.packages }}

      - name: Configure
        run: cmake --preset ${{ matrix.build_type }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type }}

      - name: Test
        run: ctest --preset ${{ matrix.build_type }} --output-on-failure

  asan:
    name: asan+ubsan (clang)
    runs-on: ubuntu-24.04
    env:
      CC: clang-17
      CXX: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        run: ctest --preset asan --output-on-failure

  tsan:
    name: tsan (clang)
    runs-on: ubuntu-24.04
    env:
      CC: clang-17
      CXX: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17

      # TSan-instrumented binaries crash at startup when kernel ASLR entropy
      # (vm.mmap_rnd_bits, 32 on recent Ubuntu kernels) exceeds what the
      # runtime tolerates; 28 is the documented workaround.
      - name: Lower ASLR entropy for TSan
        run: sudo sysctl vm.mmap_rnd_bits=28

      - name: Configure
        run: cmake --preset tsan

      - name: Build
        run: cmake --build --preset tsan

      # Threaded tests only: TSan finds nothing in the single-threaded suites
      # but multiplies their 1M-op differential runs into minutes.
      - name: Test (concurrency label)
        run: ctest --preset tsan -L concurrency --output-on-failure

  format:
    name: format (clang-format)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --version
          ./scripts/format.sh --check
